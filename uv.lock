version = 40
requires-python = ">=3.10"

[[package]]
name = "code-review-env"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "openenv-core" },
    { name = "fastapi" },
    { name = "uvicorn", extras = ["standard"] },
    { name = "pydantic", version = ">=2.0" },
    { name = "openai" },
]

[[package]]
name = "fastapi"
version = "0.104.1"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "pydantic", version = ">=1.7.4,<3.0.0" },
    { name = "starlette", version = ">=0.27.0,<0.28.0" },
    { name = "typing-extensions", version = ">=4.8.0" },
]

[[package]]
name = "pydantic"
version = "2.5.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "annotated-types", version = ">=0.4.0" },
    { name = "pydantic-core", version = ">=2.14.5,<3" },
    { name = "typing-extensions", version = "!=4.7" },
]

[[package]]
name = "uvicorn"
version = "0.24.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "click", version = ">=7.0" },
    { name = "h11", version = ">=0.8" },
]

[[package]]
name = "starlette"
version = "0.27.0"
source = { registry = "https://pypi.org/simple" }
